<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Immune System Support & Wellness Supplements | 4Life Shop</title>
  <meta name="description" content="4Life Research – science-backed immune support supplements available worldwide.">

  <!-- ── GOOGLE TAG ── -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KTPTHXWN3F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KTPTHXWN3F');
  </script>

  <!-- Google Tag (Ads) -->
  <script>
    gtag('event', 'conversion', {
        'send_to': 'AW-18153230010/QWKJCJXo5KocELqdkdBD',
        'transaction_id': ''
        // 'new_customer': true /* calculate dynamically, populate with true/false */,
    });
  </script>


  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1628;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .loader {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #007DE3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader p {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      letter-spacing: 0.3px;
    }
    .loader img {
      height: 36px;
      opacity: 0.85;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- Shown briefly while geo lookup runs -->
  <div class="loader" id="loader">
    <img src="https://media2.4life.com/images/logos/Blue_Logo_Primary_v2a_ENG.svg" alt="4Life" />
    <div class="spinner"></div>
    <p>Finding your local store…</p>
  </div>

  <script>
    /* ============================================================
       COUNTRY → FILE MAP
       Add or remove countries here. The file names must match
       the HTML files sitting in the same folder as this index.html
       Unmapped countries fall back to usa.html
       ============================================================ */
    var COUNTRY_MAP = {
      "DE": "germany.html",   // Germany
      "PE": "peru.html",      // Peru
      "MX": "mexico.html",    // Mexico
      "EC": "ecuador.html",   // Ecuador
      "US": "usa.html"        // United States (also the fallback)
    };

    var FALLBACK = "usa.html";

    /* ── GEO DETECTION ── */
    function loadCountryPage(countryCode) {
      var file = COUNTRY_MAP[countryCode] || FALLBACK;

      /* Track which country was detected */
      gtag('event', 'geo_detected', {
        'event_category': 'geo',
        'event_label': countryCode || 'unknown',
        'page_loaded': file
      });

      /* Fetch the country-specific HTML and replace the entire document */
      fetch(file)
        .then(function(res) {
          if (!res.ok) throw new Error("File not found: " + file);
          return res.text();
        })
        .then(function(html) {
          /* Replace full document with the country page */
          document.open();
          document.write(html);
          document.close();

          /* Update browser URL to reflect the country file without a page reload */
          if (window.history && window.history.replaceState) {
            window.history.replaceState({}, '', window.location.href);
          }
        })
        .catch(function(err) {
          console.warn("Could not load country page, loading fallback.", err);
          if (file !== FALLBACK) {
            fetch(FALLBACK).then(function(r){ return r.text(); }).then(function(html){
              document.open(); document.write(html); document.close();
            });
          }
        });
    }

    /* ── IP GEOLOCATION (free, no API key needed) ── */
    fetch("https://ipapi.co/json/")
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var code = (data && data.country_code) ? data.country_code.toUpperCase() : null;
        loadCountryPage(code);
      })
      .catch(function() {
        /* If geo API fails (e.g. ad blocker), load fallback silently */
        loadCountryPage(null);
      });
  </script>

</body>
</html>
