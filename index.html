  <title>Immune System Support & Wellness Supplements | 4Life Shop</title>
  <meta name="description" content="4Life Research – science-backed immune support supplements available worldwide.">

  <!-- ── GOOGLE TAG ── -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18153230010"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KTPTHXWN3F');
    gtag('config', 'AW-18153230010');
    /* ============================================================
       🔧 SHARED CONFIG — change these ONE place, affects ALL pages
       ============================================================ */
    window.SITE_CONFIG = {
      GTAG_ID:   'G-KTPTHXWN3F',
      AW_ID:     'AW-18153230010',
      AW_LABEL:  'QWKJCJXo5KocELqdkdBD',
      DIST_ID:   '12928389'
    };
  </script>
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1628;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .loader { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #007DE3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader p { color: rgba(255,255,255,0.5); font-size: 13px; letter-spacing: 0.3px; }
    .loader img { height: 36px; opacity: 0.85; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <img src="https://media2.4life.com/images/logos/Blue_Logo_Primary_v2a_ENG.svg" alt="4Life" />
    <div class="spinner"></div>
    <p>Finding your local store…</p>
  </div>

  <script>
    /* ============================================================
       COUNTRY → FILE MAP
       Add or remove entries here. Unmapped countries → usa.html
       ============================================================ */
    var COUNTRY_MAP = {
      "DE": "germany.html",
      "PE": "peru.html",
      "MX": "mexico.html",
      "EC": "ecuador.html",
      "US": "usa.html"
    };
    var FALLBACK = "usa.html";

    function loadCountryPage(countryCode) {
      var file = COUNTRY_MAP[countryCode] || FALLBACK;

      gtag('event', 'geo_detected', {
        'event_category': 'geo',
        'event_label': countryCode || 'unknown',
        'page_loaded': file
      });

      fetch(file)
        .then(function(res) {
          if (!res.ok) throw new Error("File not found: " + file);
          return res.text();
        })
        .then(function(html) {
          /* Inject shared config so country pages can read it */
          var configScript = '<script>window.SITE_CONFIG=' +
            JSON.stringify(window.SITE_CONFIG) + ';<\/script>';
          html = html.replace('</head>', configScript + '</head>');

          document.open();
          document.write(html);
          document.close();

          if (window.history && window.history.replaceState) {
            window.history.replaceState({}, '', window.location.href);
          }
        })
        .catch(function(err) {
          console.warn("Could not load country page, loading fallback.", err);
          if (file !== FALLBACK) {
            fetch(FALLBACK).then(function(r){ return r.text(); }).then(function(html){
              document.open(); document.write(html); document.close();
            });
          }
        });
    }

    fetch("https://ipapi.co/json/")
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var code = (data && data.country_code) ? data.country_code.toUpperCase() : null;
        loadCountryPage(code);
      })
      .catch(function() { loadCountryPage(null); });
  </script>
</body>
</html>
